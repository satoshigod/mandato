<!DOCTYPE html>
<html lang="es-CO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0F6E56">
<meta name="robots" content="noindex">
<title>Panel broker — Mandato</title>
<link rel="stylesheet" href="styles.css">
<style>
  .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .login-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 32px 28px; max-width: 380px; width: 100%; box-shadow: var(--shadow-md); }
  .login-card h1 { font-size: 20px; margin: 0 0 6px; font-weight: 600; letter-spacing: -0.015em; }
  .login-card p { font-size: 13px; color: var(--text-muted); margin: 0 0 20px; }
  .app { display: none; }
  .app.active { display: block; }
  .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 18px; }
  @media (min-width: 720px) { .stats-row { grid-template-columns: repeat(4, 1fr); } }
  .stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 12px 14px; }
  .stat-label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase; font-weight: 600; }
  .stat-value { font-size: 22px; font-weight: 600; margin-top: 2px; letter-spacing: -0.02em; }
  .filter-bar { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-pill { padding: 7px 13px; border-radius: var(--radius-pill); border: 0.5px solid var(--border-strong); background: var(--surface); color: var(--text); font-size: 13px; white-space: nowrap; flex-shrink: 0; }
  .filter-pill.active { background: var(--brand); border-color: var(--brand); color: white; font-weight: 500; }
  .mandate-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 16px 18px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.15s; }
  .mandate-card:hover { border-color: var(--brand); }
  .mandate-card.featured { border-color: var(--gold); background: var(--gold-light); }
  .mandate-card.locked { opacity: 0.7; cursor: pointer; position: relative; }
  .mandate-card.locked::after { content: '🔒'; position: absolute; top: 14px; right: 14px; font-size: 16px; }
  .mandate-card.locked .mandate-text { filter: blur(4px); user-select: none; }
  .mandate-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .mandate-id { font-size: 11px; color: var(--text-faint); font-family: monospace; }
  .mandate-text { font-size: 14px; line-height: 1.55; margin: 6px 0 10px; }
  .mandate-meta { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; font-size: 11px; color: var(--text-faint); }
  .mandate-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
  .mandate-tag { font-size: 10px; padding: 3px 8px; border-radius: var(--radius-sm); background: var(--surface-alt); color: var(--text-muted); }
  .mandate-tag.hot { background: var(--brand-light); color: var(--brand-text); font-weight: 500; }
  .empty { background: var(--surface); border: 0.5px dashed var(--border-strong); border-radius: var(--radius-lg); padding: 50px 24px; text-align: center; color: var(--text-muted); }
  .empty h3 { font-size: 16px; color: var(--text); margin: 0 0 6px; font-weight: 500; }
  .empty p { font-size: 13px; max-width: 320px; line-height: 1.6; margin: 0 auto; }
  .upgrade-card { background: var(--brand-light); border-radius: var(--radius-md); padding: 16px 18px; text-align: center; margin-bottom: 18px; }
  .upgrade-card h3 { margin: 0 0 6px; color: var(--brand-text); font-size: 15px; }
  .upgrade-card p { margin: 0 0 12px; font-size: 13px; color: var(--brand-text); line-height: 1.5; }
</style>
</head>
<body>

<!-- Loading -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="brand" style="margin-bottom:18px"><svg class="brand-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21V8l9-5 9 5v13"/><path d="M9 21v-7h6v7"/></svg><span class="brand-name">Mandato</span></div>
    <h1>Verificando sesión...</h1>
    <p>Si no estás logueado serás redirigido al login.</p>
  </div>
</div>

<!-- App -->
<div class="app" id="app">
  <header class="nav">
    <div class="nav-inner">
      <a href="index.html" class="brand"><svg class="brand-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21V8l9-5 9 5v13"/><path d="M9 21v-7h6v7"/></svg><span class="brand-name">Mandato</span><span style="font-size:10px; padding:2px 8px; background:var(--brand-light); color:var(--brand-text); border-radius:999px; font-weight:600; margin-left:6px;">brokers</span></a>
      <div class="nav-actions">
        <span style="font-size:13px; color:var(--text-muted); margin-right:8px;" id="broker-name"></span>
        <button type="button" class="btn btn-ghost btn-sm" id="logout-btn">Salir</button>
      </div>
    </div>
  </header>

  <main class="wrap-wide" style="padding-top:24px; padding-bottom:48px;">

    <h1 style="font-size:24px; margin:0 0 6px; font-weight:600; letter-spacing:-0.02em;" id="welcome">Bienvenido</h1>
    <p style="font-size:14px; color:var(--text-muted); margin:0 0 20px;">Mandatos disponibles según tu plan y zonas de operación.</p>

    <div id="plan-banner"></div>

    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Plan</div><div class="stat-value" id="stat-plan">—</div></div>
      <div class="stat-card"><div class="stat-label">Mandatos vistos este mes</div><div class="stat-value" id="stat-views">0</div></div>
      <div class="stat-card"><div class="stat-label">Mandatos disponibles</div><div class="stat-value" id="stat-available">0</div></div>
      <div class="stat-card"><div class="stat-label">Vence en</div><div class="stat-value" id="stat-vence">—</div></div>
    </div>

    <div class="filter-bar">
      <button type="button" class="filter-pill active" data-filter="all">Todos</button>
      <button type="button" class="filter-pill" data-filter="featured">Premium destacados</button>
      <button type="button" class="filter-pill" data-filter="my-zones">Mis zonas</button>
      <button type="button" class="filter-pill" data-filter="my-range">Mi rango</button>
    </div>

    <div id="feed"></div>

  </main>

  <footer>
    <div class="wrap foot-inner">
      <span class="foot-text">© Mandato 2026</span>
      <div class="foot-links">
        <a href="pricing.html?tab=broker">Planes</a>
        <a href="#">Contacto</a>
      </div>
    </div>
  </footer>
</div>

<!-- Modal detalle de mandato -->
<div class="modal-backdrop" id="detail-modal">
  <div class="modal" style="max-width:560px">
    <h3 id="detail-title" style="font-size:18px; margin:0 0 4px; font-weight:600;">Detalle</h3>
    <div id="detail-id" style="font-size:11px; color:var(--text-faint); margin-bottom:16px;"></div>
    <div id="detail-body"></div>
    <div style="display:flex; gap:8px; margin-top:18px;">
      <button type="button" class="btn" id="detail-close">Cerrar</button>
      <button type="button" class="btn btn-whatsapp" id="detail-contact" style="margin-left:auto">Contactar por WhatsApp</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
(function() {
  var H = window.MANDATO_HELPERS;
  var DB = window.MANDATO_DB;
  var AUTH = window.MANDATO_AUTH;

  var PLANS = {
    broker_basico: { nombre: 'Básico', precio: 149000, max_views: 10, contacto_directo: false, prioridad: 1 },
    broker_pro: { nombre: 'Pro', precio: 349000, max_views: null, contacto_directo: true, prioridad: 5 },
    broker_elite: { nombre: 'Élite', precio: 799000, max_views: null, contacto_directo: true, prioridad: 10 }
  };

  var currentBroker = null;
  var currentFilter = 'all';
  var currentMandates = [];

  function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('active');
    renderBroker();
    loadFeed();
  }

  function redirectToLogin() {
    window.location.href = 'login-broker.html';
  }

  // ===== Verificar sesión =====
  if (!AUTH.isAuthenticated()) {
    redirectToLogin();
    return;
  }
  var authUser = AUTH.getUser();
  if (!authUser) {
    AUTH.signOut();
    redirectToLogin();
    return;
  }

  DB.select('brokers', 'auth_user_id=eq.' + authUser.id)
    .then(function(rows) {
      if (!rows || rows.length === 0) {
        H.showToast('No encontramos tu perfil de broker.');
        AUTH.signOut();
        setTimeout(redirectToLogin, 1200);
        return;
      }
      currentBroker = rows[0];
      showApp();
    })
    .catch(function(err) {
      console.error(err);
      H.showToast('Error de conexión: ' + err.message);
    });

  document.getElementById('logout-btn').addEventListener('click', function() {
    AUTH.signOut();
    setTimeout(redirectToLogin, 200);
  });

  function renderBroker() {
    var name = currentBroker.nombre || currentBroker.name || 'Broker';
    var planId = currentBroker.plan_id || currentBroker.planId || 'broker_basico';
    var plan = PLANS[planId] || PLANS.broker_basico;
    document.getElementById('broker-name').textContent = name.split(' ')[0];
    document.getElementById('welcome').textContent = 'Hola, ' + name.split(' ')[0];
    document.getElementById('stat-plan').textContent = plan.nombre;
    document.getElementById('stat-views').textContent = (currentBroker.mandatos_vistos_mes || 0) + (plan.max_views ? '/' + plan.max_views : '');

    var venceAt = currentBroker.plan_vence_at;
    document.getElementById('stat-vence').textContent = venceAt ? H.daysUntil(venceAt) + ' días' : '—';

    var banner = document.getElementById('plan-banner');
    var activo = currentBroker.activo !== false;
    if (!activo) {
      banner.className = 'plan-banner warning';
      banner.innerHTML = '<div>Tu suscripción <strong>no está activa</strong>. Renueva para volver a ver mandatos.</div>' +
        '<div class="plan-banner-actions"><a href="pricing.html?tab=broker" class="btn btn-primary btn-sm">Renovar plan</a></div>';
    } else if (planId === 'broker_basico' && (currentBroker.mandatos_vistos_mes || 0) >= 7) {
      banner.className = 'plan-banner brand';
      banner.innerHTML = '<div>Te quedan <strong>' + (10 - (currentBroker.mandatos_vistos_mes || 0)) + ' mandatos</strong> este mes en plan Básico.</div>' +
        '<div class="plan-banner-actions"><a href="pricing.html?tab=broker" class="btn btn-primary btn-sm">Subir a Pro</a></div>';
    }
  }

  function loadFeed() {
    if (!DB.isConfigured()) {
      currentMandates = getDemoMandates();
      renderFeed();
      return;
    }
    DB.select('mandatos', 'status=eq.active&order=destacado.desc,created_at.desc&limit=50').then(function(rows) {
      currentMandates = rows || [];
      renderFeed();
    }).catch(function(e){ console.error(e); currentMandates = []; renderFeed(); });
  }

  function getDemoMandates() {
    return [
      { id: 'm_demo_1', created_at: new Date(Date.now() - 6*3600*1000).toISOString(), free_text: 'Apartamento 2 hab en El Poblado o Laureles para Airbnb · 60 m² o más · estrato 5–6 · contado · hasta $450M.', destacado: true, ofertas_count: 3, fields: { 'Forma de pago': 'Contado', 'Plazo': '1 a 3 meses', 'Zona': 'El Poblado, Laureles' }, contact_name: 'Juan P.', contact_phone: '3001234567' },
      { id: 'm_demo_2', created_at: new Date(Date.now() - 2*86400*1000).toISOString(), free_text: 'Casa familiar en Envigado · 3 habitaciones · con patio · estrato 5 · crédito pre-aprobado · hasta $900M.', destacado: false, ofertas_count: 2, fields: { 'Forma de pago': 'Crédito', 'Zona': 'Envigado' }, contact_name: 'María R.', contact_phone: '3109876543' },
      { id: 'm_demo_3', created_at: new Date(Date.now() - 86400*1000).toISOString(), free_text: 'Apartaestudio en Provenza para flip · acepta para remodelar · hasta $280M · contado.', destacado: false, ofertas_count: 0, fields: { 'Forma de pago': 'Contado', 'Plazo': 'Esta semana' }, contact_name: 'Andrés F.', contact_phone: '3145556677' },
      { id: 'm_demo_4', created_at: new Date(Date.now() - 5*86400*1000).toISOString(), free_text: 'Lote en Las Palmas o Llanogrande · 800 a 1.200M · sin afán · prefiere con vista a la ciudad.', destacado: false, ofertas_count: 1, fields: { 'Plazo': 'Sin afán', 'Zona': 'Las Palmas' }, contact_name: 'Carlos M.', contact_phone: '3201112233' }
    ];
  }

  function renderFeed() {
    var planId = currentBroker.plan_id || 'broker_basico';
    var plan = PLANS[planId] || PLANS.broker_basico;
    var activo = currentBroker.activo !== false;

    var visible = currentMandates.slice();
    if (currentFilter === 'featured') visible = visible.filter(function(m){return m.destacado;});
    else if (currentFilter === 'my-zones') {
      var myZones = (currentBroker.zonas_especialidad || []);
      visible = visible.filter(function(m) {
        var zona = (m.fields && m.fields.Zona) || '';
        return myZones.some(function(z){ return zona.indexOf(z) !== -1; });
      });
    }

    document.getElementById('stat-available').textContent = visible.length;

    if (!activo) {
      document.getElementById('feed').innerHTML = '<div class="upgrade-card"><h3>Tu suscripción no está activa</h3><p>Renueva tu plan para volver a ver mandatos.</p><a href="pricing.html?tab=broker" class="btn btn-primary">Renovar ahora</a></div>';
      return;
    }

    if (visible.length === 0) {
      document.getElementById('feed').innerHTML = '<div class="empty"><h3>No hay mandatos en este filtro</h3><p>Vuelve a revisar pronto. Llegan mandatos nuevos cada día.</p></div>';
      return;
    }

    var maxViews = plan.max_views;
    var viewedCount = currentBroker.mandatos_vistos_mes || 0;

    document.getElementById('feed').innerHTML = visible.map(function(m, i) {
      var locked = maxViews && (i + viewedCount) >= maxViews;
      var tags = '';
      if (m.destacado) tags += '<span class="mandate-tag hot">premium</span>';
      if (m.fields) {
        if (m.fields['Forma de pago']) tags += '<span class="mandate-tag">' + H.escapeHtml(m.fields['Forma de pago'].toLowerCase()) + '</span>';
        if (m.fields['Plazo']) tags += '<span class="mandate-tag">' + H.escapeHtml(m.fields['Plazo'].toLowerCase()) + '</span>';
      }
      return '<div class="mandate-card ' + (m.destacado ? 'featured ' : '') + (locked ? 'locked' : '') + '" data-id="' + H.escapeHtml(m.id) + '">' +
        '<div class="mandate-head"><div class="mandate-id">' + H.escapeHtml(m.id) + '</div></div>' +
        '<div class="mandate-text">' + H.escapeHtml(m.free_text || 'Sin descripción') + '</div>' +
        '<div class="mandate-tags">' + tags + '</div>' +
        '<div class="mandate-meta" style="margin-top:8px;">' +
          '<span>' + H.timeAgo(m.created_at) + ' · ' + (m.ofertas_count || 0) + ' oferta' + ((m.ofertas_count || 0) !== 1 ? 's' : '') + '</span>' +
          (locked ? '<span style="color:var(--brand);font-weight:500;">Sube a Pro para ver →</span>' : '<span>click para ver →</span>') +
        '</div>' +
      '</div>';
    }).join('');

    document.querySelectorAll('.mandate-card').forEach(function(card) {
      card.addEventListener('click', function() {
        if (card.classList.contains('locked')) {
          window.location.href = 'pricing.html?tab=broker';
          return;
        }
        openDetail(card.getAttribute('data-id'));
      });
    });
  }

  document.querySelectorAll('.filter-pill').forEach(function(pill) {
    pill.addEventListener('click', function() {
      document.querySelectorAll('.filter-pill').forEach(function(p){p.classList.remove('active');});
      pill.classList.add('active');
      currentFilter = pill.getAttribute('data-filter');
      renderFeed();
    });
  });

  function openDetail(id) {
    var m = currentMandates.find(function(x){return x.id === id;});
    if (!m) return;

    var planId = currentBroker.plan_id || 'broker_basico';
    var plan = PLANS[planId] || PLANS.broker_basico;

    var fieldsHtml = '';
    if (m.fields) {
      Object.keys(m.fields).forEach(function(k) {
        fieldsHtml += '<div style="display:flex; justify-content:space-between; padding:7px 0; border-bottom:0.5px solid var(--border); font-size:13px;"><span style="color:var(--text-muted)">' + H.escapeHtml(k) + '</span><span style="font-weight:500">' + H.escapeHtml(m.fields[k]) + '</span></div>';
      });
    }

    var contactHtml = '';
    if (plan.contacto_directo) {
      contactHtml = '<div style="background:var(--brand-light); border-radius:var(--radius-md); padding:12px 14px; margin-top:14px; font-size:13px; color:var(--brand-text);">' +
        '<div style="font-weight:600; margin-bottom:4px;">Contacto directo (Plan Pro+)</div>' +
        '<div>' + H.escapeHtml(m.contact_name || 'Comprador') + '</div>' +
        '<div>+57 ' + H.escapeHtml(m.contact_phone || '') + '</div>' +
        '</div>';
    } else {
      contactHtml = '<div style="background:var(--surface-alt); border-radius:var(--radius-md); padding:12px 14px; margin-top:14px; font-size:13px; color:var(--text-muted); text-align:center;">' +
        'Contacto vía plataforma. <a href="pricing.html?tab=broker" style="color:var(--brand)">Sube a Pro</a> para ver WhatsApp directo.</div>';
    }

    document.getElementById('detail-title').textContent = 'Mandato';
    document.getElementById('detail-id').textContent = m.id + ' · ' + H.timeAgo(m.created_at);
    document.getElementById('detail-body').innerHTML =
      '<div style="font-size:14px; line-height:1.6; margin-bottom:14px; padding:12px 14px; background:var(--bg); border-radius:var(--radius-md);">' + H.escapeHtml(m.free_text || 'Sin descripción') + '</div>' +
      fieldsHtml +
      contactHtml;

    var contactBtn = document.getElementById('detail-contact');
    if (plan.contacto_directo) {
      contactBtn.style.display = 'inline-flex';
      contactBtn.onclick = function() {
        var msg = 'Hola ' + (m.contact_name || '').split(' ')[0] + ', soy ' + (currentBroker.nombre || 'broker') + ' de Mandato. Vi tu solicitud y tengo opciones que pueden encajar. ¿Hablamos?';
        window.open('https://wa.me/57' + m.contact_phone + '?text=' + encodeURIComponent(msg), '_blank');
      };
    } else {
      contactBtn.style.display = 'none';
    }

    document.getElementById('detail-modal').classList.add('open');
    document.body.classList.add('modal-open');

    // Registrar vista (en producción, increment counter)
    if (DB.isConfigured() && currentBroker.id) {
      DB.insert('broker_mandato_views', { broker_id: currentBroker.id, mandate_id: id }).catch(function(){});
    }
  }

  document.getElementById('detail-close').addEventListener('click', function() {
    document.getElementById('detail-modal').classList.remove('open');
    document.body.classList.remove('modal-open');
  });
  document.getElementById('detail-modal').addEventListener('click', function(e) {
    if (e.target === this) {
      this.classList.remove('open');
      document.body.classList.remove('modal-open');
    }
  });

})();
</script>

</body>
</html>
