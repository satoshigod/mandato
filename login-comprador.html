<!DOCTYPE html>
<html lang="es-CO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0F6E56">
<title>Iniciar sesión — Mandato</title>
<link rel="stylesheet" href="styles.css">
<style>
  .auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .auth-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 32px 28px; max-width: 400px; width: 100%; box-shadow: var(--shadow-md); }
  .auth-card h1 { font-size: 22px; margin: 0 0 6px; font-weight: 600; letter-spacing: -0.015em; }
  .auth-card p.lead { font-size: 14px; color: var(--text-muted); margin: 0 0 22px; }
  .auth-foot { text-align: center; font-size: 13px; color: var(--text-muted); margin-top: 18px; padding-top: 18px; border-top: 0.5px solid var(--border); line-height: 1.6; }
  .auth-foot a { color: var(--brand); text-decoration: none; font-weight: 500; }
  .auth-foot a:hover { text-decoration: underline; }
  .forgot-link { font-size: 12px; color: var(--brand); text-decoration: none; }
  .forgot-link:hover { text-decoration: underline; }
  .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .label-row label { margin-bottom: 0 !important; }
</style>
</head>
<body>

<div class="auth-screen">
  <div class="auth-card">
    <a href="index.html" class="brand" style="margin-bottom:18px; display:inline-flex;">
      <svg class="brand-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21V8l9-5 9 5v13"/><path d="M9 21v-7h6v7"/></svg>
      <span class="brand-name">Mandato</span>
    </a>
    <h1>Iniciar sesión</h1>
    <p class="lead">Bienvenido de vuelta. Accede a tu cuenta de inversionista.</p>

    <div class="form-field" id="field-email">
      <label for="email">Email</label>
      <input type="email" id="email" autocomplete="email" placeholder="tu@ejemplo.com">
      <div class="form-error">Ingresa un email válido.</div>
    </div>

    <div class="form-field" id="field-password">
      <div class="label-row">
        <label for="password">Contraseña</label>
        <a href="recuperar.html" class="forgot-link">¿Olvidaste tu contraseña?</a>
      </div>
      <input type="password" id="password" autocomplete="current-password" placeholder="Mínimo 6 caracteres">
      <div class="form-error">Contraseña requerida.</div>
    </div>

    <button type="button" class="btn btn-primary btn-block btn-lg" id="btn-login">Iniciar sesión</button>

    <div class="auth-foot">
      ¿No tienes cuenta?<br>
      <a href="signup-comprador.html">Crear cuenta de inversionista</a><br>
      <a href="login-broker.html" style="color:var(--text-muted); font-size:12px;">¿Eres broker? Entra aquí</a>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
(function() {
  var H = window.MANDATO_HELPERS;
  var AUTH = window.MANDATO_AUTH;
  var DB = window.MANDATO_DB;

  // Si ya está logueado, redirigir directamente
  if (AUTH.isAuthenticated()) {
    window.location.href = 'mi-cuenta.html';
    return;
  }

  function clearErrors() {
    document.querySelectorAll('.form-field').forEach(function(f){ f.classList.remove('has-error'); });
  }

  function validate() {
    clearErrors();
    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    var ok = true;
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      document.getElementById('field-email').classList.add('has-error');
      ok = false;
    }
    if (password.length < 6) {
      document.getElementById('field-password').classList.add('has-error');
      ok = false;
    }
    return ok;
  }

  function doLogin() {
    if (!validate()) return;
    var btn = document.getElementById('btn-login');
    btn.disabled = true;
    btn.textContent = 'Ingresando...';

    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;

    AUTH.signIn(email, password)
      .then(function(data) {
        // Verificar que sea comprador (existe en tabla usuarios)
        return DB.select('usuarios', 'auth_user_id=eq.' + data.user.id);
      })
      .then(function(rows) {
        if (!rows || rows.length === 0) {
          // No es comprador, cerramos sesión
          AUTH.signOut();
          throw new Error('No encontramos cuenta de comprador con ese email. Si eres broker, inicia sesión en login-broker.html.');
        }
        H.showToast('¡Bienvenido!');
        setTimeout(function() { window.location.href = 'mi-cuenta.html'; }, 400);
      })
      .catch(function(err) {
        var msg = err.message || 'Error al iniciar sesión';
        if (msg.indexOf('Invalid login') !== -1 || msg.indexOf('credentials') !== -1) {
          msg = 'Email o contraseña incorrectos';
        }
        H.showToast(msg);
        btn.disabled = false;
        btn.textContent = 'Iniciar sesión';
      });
  }

  document.getElementById('btn-login').addEventListener('click', doLogin);
  document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('email').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('password').focus();
  });

  document.getElementById('email').focus();
})();
</script>

</body>
</html>
